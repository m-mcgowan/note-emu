[env:wokwi]
platform = espressif32
board = esp32-s3-devkitm-1
framework = arduino
build_flags =
    -std=gnu++23
    -Wno-deprecated-declarations
    -DCORE_DEBUG_LEVEL=1
build_unflags = -std=gnu++11
monitor_speed = 115200
lib_deps =
    note-emu=symlink://../../
    note-cpp=https://github.com/m-mcgowan/note-cpp.git#v0.3.3
    ; For iteration against a local note-cpp checkout, replace the line above with:
    ;   note-cpp=symlink:///abs/path/to/note-cpp
lib_ldf_mode = chain
