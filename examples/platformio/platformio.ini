; note-emu PlatformIO example — ESP32-S3 DevKit
;
; Copy secrets.ini.example to secrets.ini and fill in your values.

[platformio]
default_envs = esp32s3

[env:esp32s3]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board = esp32-s3-devkitm-1
framework = arduino
board_build.psram = disabled
board_upload.flash_size = 16MB
board_upload.after_reset = watchdog-reset
build_flags =
    -std=gnu++23
    -Wno-deprecated-declarations
    -DARDUINO_USB_CDC_ON_BOOT=1
build_unflags = -std=gnu++11
monitor_speed = 115200
lib_deps =
    blues/Blues Wireless Notecard
    note-emu=symlink://../../
lib_ldf_mode = chain

; To set credentials, create secrets.ini alongside this file:
;
;   [env:esp32s3]
;   build_flags =
;       ${env:esp32s3.build_flags}
;       -DWIFI_SSID=\"your-ssid\"
;       -DWIFI_PASS=\"your-password\"
;       -DNOTEHUB_PAT=\"your-notehub-api-token\"
;       -DNOTEHUB_PRODUCT=\"com.example.softcard\"
;
; And add to [platformio]:
;   extra_configs = secrets.ini
