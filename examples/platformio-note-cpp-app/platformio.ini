; note-emu + note-cpp-app integration example
;
; Demonstrates note-cpp-app's application framework with a virtual Notecard
; via the Blues softcard service. No physical Notecard needed.
;
; Copy src/secrets.h.example to src/secrets.h and fill in your values.

[platformio]
default_envs = esp32s3

[env:esp32s3]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board = esp32-s3-devkitm-1
framework = arduino
board_build.psram = disabled
board_upload.flash_size = 16MB
board_upload.after_reset = watchdog-reset
build_flags =
    -std=gnu++23
    -Wno-deprecated-declarations
    -DARDUINO_USB_CDC_ON_BOOT=1
build_unflags = -std=gnu++11
monitor_speed = 115200
lib_deps =
    note-emu=symlink://../../
    note-cpp=symlink://${sysenv.HOME}/e/note-cpp
    note-cpp-app=symlink://${sysenv.HOME}/e/note-cpp-app
lib_ldf_mode = chain
