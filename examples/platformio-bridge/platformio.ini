; note-emu + note-c + note-cpp coexistence example
;
; Demonstrates note-cpp's "bridge mode" against a note-emu virtual
; Notecard: note-c owns the transport, note-cpp typed calls route
; through NoteRequestResponseJSON(). Both APIs work against the same
; virtual Notecard in one sketch.
;
; See <note/emu/note_cpp_bridge.hpp> and note-cpp's migration guide:
;   https://github.com/m-mcgowan/note-cpp/blob/main/docs/platforms/host/migration-from-note-c.md
;
; Copy src/secrets.h.example to src/secrets.h and fill in your values.

[platformio]
default_envs = esp32s3

[base]
board = esp32-s3-devkitm-1
framework = arduino
build_flags =
    -std=gnu++23
    -Wno-deprecated-declarations
build_unflags = -std=gnu++11
monitor_speed = 115200
lib_deps =
    blues/Blues Wireless Notecard
    note-emu=symlink://../../
    note-cpp=https://github.com/m-mcgowan/note-cpp.git#v0.3.3
lib_ldf_mode = chain

[env:esp32s3]
extends = base
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board_build.psram = disabled
board_upload.flash_size = 16MB
board_upload.after_reset = watchdog-reset
build_flags =
    ${base.build_flags}
    -DARDUINO_USB_CDC_ON_BOOT=1

[env:wokwi]
extends = base
platform = espressif32
build_flags =
    ${base.build_flags}
    -DCORE_DEBUG_LEVEL=1
