name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout note-emu
        uses: actions/checkout@v4
        with:
          path: note-emu

      - name: Checkout note-cpp (for note-cpp examples)
        uses: actions/checkout@v4
        with:
          repository: m-mcgowan/note-cpp
          path: note-cpp

      - name: Link note-cpp to ci.sh's expected location
        run: |
          mkdir -p "$HOME/e"
          ln -s "$GITHUB_WORKSPACE/note-cpp" "$HOME/e/note-cpp"

      - name: Stub gitignored secrets from .example templates
        working-directory: note-emu
        run: |
          find . -name '*.example' -not -path './.git/*' | while read -r f; do
            target="${f%.example}"
            if [ ! -e "$target" ]; then
              cp "$f" "$target"
              echo "stubbed: $target"
            fi
          done

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libcurl4-openssl-dev

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          python -m pip install platformio

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: pio-${{ runner.os }}-${{ hashFiles('note-emu/**/platformio.ini') }}
          restore-keys: |
            pio-${{ runner.os }}-

      - name: Run ci.sh
        working-directory: note-emu
        run: ./ci.sh
