name: Endpoint canary

# Pings the Notehub + softcard endpoints note-emu depends on, so we hear about
# upstream contract breaks before users do. Not part of the main CI build —
# runs on a schedule.
#
# Requires a repo secret NOTEHUB_PAT — a Notehub Personal Access Token. Set it
# via:  gh secret set NOTEHUB_PAT -R m-mcgowan/note-emu

on:
  schedule:
    - cron: '0 12 * * *'   # daily at 12:00 UTC
  workflow_dispatch:        # manual trigger from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Run endpoint canary
        env:
          NOTEHUB_PAT: ${{ secrets.NOTEHUB_PAT }}
        run: python3 tests/test_endpoints.py
